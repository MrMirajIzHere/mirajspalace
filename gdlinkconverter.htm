<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 3.2//EN">
<html><head>
	<title>Link converter</title>
	<link href="images/faviconCon.png" rel="icon" type="image/png">
	<meta content="text/html; charset=iso-8859-1" http-equiv="Content-Type">
	<meta content="Miraj's Palace" property="og:title">
	<meta content="Go0gLe imAgezz coNverSi0n!!1!" property="og:description">
	<meta content="http://mirajspalace.space" property="og:url">
	<meta content="http://mirajspalace.space/images/mirajspalaceEMBED.png" property="og:image">
	<meta content="#462b52" data-react-helmet="true" name="theme-color">
	<style>
	@font-face {
	font-family: Sharp;
	src: url('Px437_Sharp_PC3K.ttf'); 
	font-smooth: never;
} 
</style>
</head>

<body background="images/animspace.gif" link="#FF0000" vlink="#7F7F7F">
	<hr style="color:ffffff">
	<span style="text-align: center; line-height:2; display: block; margin: auto; font-family: Sharp; image-rendering: pixelated; color: #ffffff; ">
	<br>
    <label for="input">LINK TO GOOGLE DRIVE IMAGE:</label><br>
    <input type="text" id="link" size="63" placeholder="https://drive.google.com/file/d/11tsEHD_4OdDei0YFgZUmeansZFPmT58X/view"><br><br>
	<label for="input">SIZE (pixels):</label><br>
	<input type="text" id="size" placeholder="1000"><br><br>
    <input type="submit" value="submit" onclick="submit()">
	<br><br>
	OUTPUT:
	<hr style="color:ffffff">
	<div id="output">
		<span style="text-decoration-line: underline">thumbnail height:</span><br>
		<span id="verticalOut"></span><br>
		<hr style="color:ffffff">
		<span style="text-decoration-line: underline">thumbnail width:</span><br>
		<span id="horizontalOut"></span><br>
		<hr style="color:ffffff">
		<span style="text-decoration-line: underline">lh3:</span><br>
		<span id="lh3Out"></span><br>
		<hr style="color:ffffff">
	</div>
	
	</span>
<script>
function submit() {
	let glink = document.getElementById('link').value;
	let size = document.getElementById('size').value;
	
	// Use placeholder values if fields are empty
	if (!glink || glink.trim() === '') {
		glink = document.getElementById('link').placeholder;
	}
	
	if (!size || size.trim() === '') {
		size = document.getElementById('size').placeholder;
	}

	console.log("Full link: " + glink);
	console.log("Size: " + size);

	let fileId = extractFileId(glink);
	console.log("File ID: " + fileId);

	if (fileId) {
		document.getElementById('verticalOut').innerHTML = "https://drive.google.com/thumbnail?id=" + fileId + "&sz=h" + size;
		document.getElementById('horizontalOut').innerHTML = "https://drive.google.com/thumbnail?id=" + fileId + "&sz=w" + size;
		document.getElementById('lh3Out').innerHTML = "https://lh3.googleusercontent.com/d/" + fileId + "=s0";
	} else {
		document.getElementById('verticalOut').innerHTML = "Invalid Google Drive link";
		document.getElementById('horizontalOut').innerHTML = "Invalid Google Drive link";
		document.getElementById('lh3Out').innerHTML = "Invalid Google Drive link";
	}
}

function extractFileId(url) {
	let match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
	if (match) return match[1];
	
	match = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
	if (match) return match[1];
	
	match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
	if (match) return match[1];
	
	match = url.match(/\/d\/([a-zA-Z0-9_-]+)=/);
	if (match) return match[1];
	
	return null;
}
</script>

</body></html>
